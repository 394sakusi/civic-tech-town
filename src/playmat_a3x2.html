<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シビックテック・タウン プレイマット印刷用(A3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        /* 印刷時の干渉を防ぐため、bodyのマージンとパディングをゼロに固定 */
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* --- 印刷用ページ設定 (A3縦を2枚) --- */
        @page {
            size: A3 portrait;
            margin: 0;
        }

        @media print {
            .no-print { display: none !important; }
            .print-page { 
                display: block !important;
                width: 297mm; 
                height: 420mm; 
                overflow: hidden; 
                position: relative; 
                page-break-after: always;
                background-color: white;
            }
            body { background-color: white; }
        }

        .print-page { display: none; }

        /* --- A2サイズの絶対領域コンテナ --- */
        .a2-canvas {
            width: 594mm;
            height: 420mm;
            background-color: white;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 15mm 15mm;
        }

        /* エリアの境界線枠 */
        .zone-box {
            border-radius: 4mm;
            box-sizing: border-box;
            position: absolute;
        }
        .zone-player {
            background-color: rgba(241, 245, 249, 0.5);
            border: 1.5px dashed #cbd5e1;
        }
        .zone-center {
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px solid #94a3b8;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .zone-label {
            position: absolute;
            font-size: 24px;
            font-weight: 900;
            color: #e2e8f0;
            letter-spacing: 0.2em;
            pointer-events: none;
            white-space: nowrap;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            inset: 0;
        }

        /* --- カードスロットの基本クラス --- */
        .slot-v { width: 63mm; height: 88mm; flex-shrink: 0; }
        .slot-h { width: 88mm; height: 63mm; flex-shrink: 0; }
        
        .c-hp { border-color: #fbbf24; color: #d97706; }
        .c-reg { border-color: #34d399; color: #059669; }
        .c-prj { border-color: #38bdf8; color: #0284c7; }
        .c-evt { border-color: #f87171; color: #dc2626; }
        .c-data { border-color: #38bdf8; color: #0284c7; }
        .c-tech { border-color: #a855f7; color: #7e22ce; }
        .c-dial { border-color: #34d399; color: #059669; }
        .c-shared { border-color: #94a3b8; color: #64748b; }

        /* 不満トラック */
        .track-step {
            width: 20mm; /* マスを広くして中央配置を綺麗に */
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            background: white;
            border-right: 1px solid #cbd5e1;
        }
        .track-step:first-child { border-radius: 2mm 0 0 2mm; }
        .track-step:last-child { border-right: none; border-radius: 0 2mm 2mm 0; }

    </style>
</head>
<body class="flex flex-col items-center">

    <!-- 操作ナビゲーション -->
    <nav class="no-print w-full max-w-5xl bg-white p-6 rounded-2xl shadow-sm border border-slate-200 my-8 text-center">
        <h1 class="text-2xl font-black text-slate-800 mb-2">🖨️ A2プレイマット（A3 x 2）</h1>
        <p class="text-sm text-slate-600 mb-4">
            ※印刷ダイアログで<strong>用紙サイズ：A3</strong>、<strong>倍率：100%</strong>、<strong>背景のグラフィック：ON</strong>に設定してください。
        </p>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-3 px-10 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 mx-auto">
            <span>印刷画面を開く (A3サイズ縦 × 2枚出力)</span>
        </button>
    </nav>

    <!-- 画面プレビューコンテナ -->
    <div id="preview-wrapper" class="no-print w-full overflow-hidden flex justify-center pb-20 relative">
        <div id="preview-scale-box" style="transform-origin: top center;">
            <div id="preview-canvas" class="a2-canvas shadow-2xl relative">
                <!-- JSでコンテンツを注入 -->
            </div>
        </div>
    </div>

    <!-- 印刷用コンテナ（A3縦 2枚） -->
    <div class="print-page">
        <div id="print-left" class="a2-canvas" style="left: 0;"></div>
    </div>
    <div class="print-page">
        <div id="print-right" class="a2-canvas" style="left: -297mm;"></div>
    </div>

    <script>
        // --- カードスロット生成ヘルパー ---
        function slotV(type, label, icon, x, y, extraClass="", rot=0) {
            const rotStyle = rot ? `transform: rotate(${rot}deg);` : '';
            return `
            <div class="slot-v absolute flex flex-col items-center justify-center border-[1.5px] rounded-[3mm] bg-white shadow-sm c-${type} ${extraClass}"
                 style="left: ${x}mm; top: ${y}mm; ${rotStyle}">
                <span class="text-[24px] opacity-70 mb-[2px]">${icon}</span>
                <span class="text-[8px] font-black tracking-wider leading-tight text-center">${label}</span>
            </div>`;
        }

        function slotH_rot(type, label, icon, x, y, deg, extraClass="") {
            return `
            <div class="slot-h absolute flex items-center justify-center border-[1.5px] rounded-[3mm] bg-white shadow-sm c-${type} ${extraClass}"
                 style="left: ${x}mm; top: ${y}mm;">
                <div style="transform: rotate(${deg}deg);" class="flex flex-col items-center justify-center w-[63mm] h-[88mm]">
                    <span class="text-[24px] opacity-70 mb-[2px]">${icon}</span>
                    <span class="text-[8px] font-black tracking-wider leading-tight text-center">${label}</span>
                </div>
            </div>`;
        }

        // =========================================================================
        // マットのコンテンツHTML（絶対座標計算）
        // =========================================================================
        
        // --- 上下・中央エリアのカードX座標 (5列) ---
        const colX = [121.8, 193.6, 265.4, 337.2, 409.0];
        
        // --- 左右エリアのカードY座標 (5行) ---
        const sideY = [20.8, 99.6, 178.4, 257.2, 336.0];

        // --- 左右エリアのX座標 ---
        const leftX = 10;
        const rightX = 496;

        // --- 上下エリアのY座標 ---
        const topY = 8;
        const bottomY = 324;

        const matContent = `
            <!-- 貼り合わせガイドライン -->
            <div class="absolute top-0 bottom-0 left-[297mm] border-l border-dashed border-slate-400 z-30 opacity-50 flex flex-col items-center justify-between py-[20mm] pointer-events-none">
                <span class="bg-white text-slate-500 text-[12px] px-3 py-1 rounded-full border border-slate-300 shadow-sm">✂️ 貼り合わせライン</span>
                <span class="bg-white text-slate-500 text-[12px] px-3 py-1 rounded-full border border-slate-300 shadow-sm">✂️ 貼り合わせライン</span>
            </div>

            <!-- 背景の透かしロゴ -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 overflow-hidden">
                <span class="text-[140px] font-black text-slate-200 tracking-[0.2em] -rotate-12 whitespace-nowrap opacity-50">CODE FOR TOWN</span>
            </div>

            <div class="absolute inset-0 z-10">
                
                <!-- ==========================================
                     ゾーン（背景枠）
                =========================================== -->
                <div class="zone-box zone-player" style="left: 111mm; top: 5mm; width: 372mm; height: 94mm;">
                    <div class="zone-label" style="transform: rotate(180deg);">PLAYER 2</div>
                </div>
                <div class="zone-box zone-player" style="left: 111mm; top: 322mm; width: 372mm; height: 93mm;">
                    <div class="zone-label">PLAYER 1</div>
                </div>
                <div class="zone-box zone-player" style="left: 5mm; top: 5mm; width: 98mm; height: 410mm;">
                    <div class="zone-label" style="transform: rotate(90deg);">PLAYER 3</div>
                </div>
                <div class="zone-box zone-player" style="left: 491mm; top: 5mm; width: 98mm; height: 410mm;">
                    <div class="zone-label" style="transform: rotate(-90deg);">PLAYER 4</div>
                </div>
                
                <!-- 中央の共有枠 (少し広げてはみ出しを解消) -->
                <div class="zone-box zone-center" style="left: 111mm; top: 104mm; width: 372mm; height: 211mm;">
                    <div class="absolute top-[-6px] left-1/2 -translate-x-1/2 bg-slate-600 text-white px-6 py-0.5 rounded-full text-[10px] font-black tracking-widest shadow-sm">COMMONS / 共有エリア</div>
                    <!-- カード種別の境界線（不満・山札・リソースを区切る） -->
                    <div class="absolute left-0 right-0 border-b border-dashed border-slate-300" style="top: 25mm;"></div>
                    <div class="absolute left-0 right-0 border-b border-dashed border-slate-300" style="top: 118mm;"></div>
                </div>

                <!-- ==========================================
                     PLAYER 2 (Top) : 180度回転 (頭が下を向く)
                     左から: PRJ 3, PRJ 2, PRJ 1, REG, HP
                =========================================== -->
                ${slotV('prj', 'ACTIVE 3', '🏘️', colX[0], topY, 'border-dashed', 180)}
                ${slotV('prj', 'ACTIVE 2', '🏘️', colX[1], topY, 'border-dashed', 180)}
                ${slotV('prj', 'ACTIVE 1', '🏘️', colX[2], topY, 'border-dashed', 180)}
                ${slotV('reg', 'REGION', '🚩', colX[3], topY, 'border-solid shadow-md', 180)}
                ${slotV('hp', 'SCORE', '✨', colX[4], topY, 'border-dashed bg-transparent border-[3px]', 180)}

                <!-- ==========================================
                     PLAYER 1 (Bottom) : 0度 (頭が上を向く)
                     左から: HP, REG, PRJ 1, PRJ 2, PRJ 3
                =========================================== -->
                ${slotV('hp', 'SCORE', '✨', colX[0], bottomY, 'border-dashed bg-transparent border-[3px]')}
                ${slotV('reg', 'REGION', '🚩', colX[1], bottomY, 'border-solid shadow-md')}
                ${slotV('prj', 'ACTIVE 1', '🏘️', colX[2], bottomY, 'border-dashed')}
                ${slotV('prj', 'ACTIVE 2', '🏘️', colX[3], bottomY, 'border-dashed')}
                ${slotV('prj', 'ACTIVE 3', '🏘️', colX[4], bottomY, 'border-dashed')}

                <!-- ==========================================
                     PLAYER 3 (Left) : 90度回転 (頭が右を向く)
                     上から: HP, REG, PRJ 1, PRJ 2, PRJ 3
                =========================================== -->
                ${slotH_rot('hp', 'SCORE', '✨', leftX, sideY[0], 90, 'border-dashed bg-transparent border-[3px]')}
                ${slotH_rot('reg', 'REGION', '🚩', leftX, sideY[1], 90, 'border-solid shadow-md')}
                ${slotH_rot('prj', 'ACTIVE 1', '🏘️', leftX, sideY[2], 90, 'border-dashed')}
                ${slotH_rot('prj', 'ACTIVE 2', '🏘️', leftX, sideY[3], 90, 'border-dashed')}
                ${slotH_rot('prj', 'ACTIVE 3', '🏘️', leftX, sideY[4], 90, 'border-dashed')}

                <!-- ==========================================
                     PLAYER 4 (Right) : -90度回転 (頭が左を向く)
                     上から: PRJ 3, PRJ 2, PRJ 1, REG, HP
                =========================================== -->
                ${slotH_rot('prj', 'ACTIVE 3', '🏘️', rightX, sideY[0], -90, 'border-dashed')}
                ${slotH_rot('prj', 'ACTIVE 2', '🏘️', rightX, sideY[1], -90, 'border-dashed')}
                ${slotH_rot('prj', 'ACTIVE 1', '🏘️', rightX, sideY[2], -90, 'border-dashed')}
                ${slotH_rot('reg', 'REGION', '🚩', rightX, sideY[3], -90, 'border-solid shadow-md')}
                ${slotH_rot('hp', 'SCORE', '✨', rightX, sideY[4], -90, 'border-dashed bg-transparent border-[3px]')}

                <!-- ==========================================
                     COMMONS (中央エリア)
                =========================================== -->
                
                <!-- 1. 不満トラック (上端・中央揃え) -->
                <div class="absolute flex flex-col bg-white border border-slate-300 rounded-[3mm] p-1 items-center justify-center shadow-sm" 
                     style="left: 118mm; top: 110mm; width: 358mm; height: 18mm;">
                    <span class="absolute top-[-6px] bg-white px-2 text-[7px] font-black text-slate-500 uppercase tracking-widest">Dissatisfaction Track (社会の不満度)</span>
                    <div class="flex h-full items-center border border-slate-200 rounded overflow-hidden">
                        <div class="track-step text-emerald-600 bg-emerald-50">0</div>
                        <div class="track-step text-emerald-600 bg-emerald-50">1</div>
                        <div class="track-step text-emerald-600 bg-emerald-50">2</div>
                        <div class="track-step text-emerald-600 bg-emerald-50">3</div>
                        <div class="track-step text-yellow-600 bg-yellow-50">4</div>
                        <div class="track-step text-yellow-600 bg-yellow-50">5</div>
                        <div class="track-step text-orange-600 bg-orange-50">6</div>
                        <div class="track-step text-orange-600 bg-orange-50">7</div>
                        <div class="track-step text-red-600 bg-red-50">8</div>
                        <div class="track-step text-red-600 bg-red-50">9</div>
                        <div class="track-step text-white bg-red-600">10</div>
                    </div>
                </div>

                <!-- 2. 山札置き場 (中段上: 横並び5つ) -->
                ${slotV('prj', 'PROJECT<br>DECK', '🏘️', colX[0], 132, 'border-solid shadow-md bg-sky-50')}
                ${slotV('evt', 'EVENT<br>DECK', '⚠️', colX[1], 132, 'border-solid shadow-md bg-red-50')}
                ${slotV('data', 'DATA<br>DECK', '🛡️', colX[2], 132, 'border-solid shadow-md bg-sky-50')}
                ${slotV('tech', 'TECH<br>DECK', '💻', colX[3], 132, 'border-solid shadow-md bg-purple-50')}
                ${slotV('dial', 'DIALOGUE<br>DECK', '🤝', colX[4], 132, 'border-solid shadow-md bg-emerald-50')}

                <!-- 3. 共有リソース置き場 (中段下: 横並び5つ) -->
                <span class="absolute text-[8px] font-black text-slate-400 tracking-widest" style="left: 121.8mm; top: 221.5mm;">SHARED REPOSITORY (共有リソース)</span>
                ${slotV('shared', 'SHARED<br>RESOURCE', '🔄', colX[0], 225, 'slot-ghost')}
                ${slotV('shared', 'SHARED<br>RESOURCE', '🔄', colX[1], 225, 'slot-ghost')}
                ${slotV('shared', 'SHARED<br>RESOURCE', '🔄', colX[2], 225, 'slot-ghost')}
                ${slotV('shared', 'SHARED<br>RESOURCE', '🔄', colX[3], 225, 'slot-ghost')}
                ${slotV('shared', 'SHARED<br>RESOURCE', '🔄', colX[4], 225, 'slot-ghost')}

            </div>
        `;

        // プレビューと印刷用コンテナへの注入
        document.getElementById('preview-canvas').innerHTML = matContent;
        document.getElementById('print-left').innerHTML = matContent;
        document.getElementById('print-right').innerHTML = matContent;

        // --- 画面プレビュー用のスケーリング（印刷には一切影響しません） ---
        function scalePreview() {
            const wrapper = document.getElementById('preview-wrapper');
            const scaleBox = document.getElementById('preview-scale-box');
            
            // A2サイズのピクセル換算 (96dpi想定: 594mm = 2245px)
            const a2WidthPx = 594 * 3.779527; 
            const a2HeightPx = 420 * 3.779527;

            // 画面幅に合わせて縮小表示
            const availableWidth = wrapper.clientWidth - 40;
            if (availableWidth < a2WidthPx) {
                const scale = availableWidth / a2WidthPx;
                scaleBox.style.transform = `scale(${scale})`;
                wrapper.style.height = `${a2HeightPx * scale}px`;
            } else {
                scaleBox.style.transform = 'scale(1)';
                wrapper.style.height = `${a2HeightPx}px`;
            }
        }

        window.addEventListener('DOMContentLoaded', scalePreview);
        window.addEventListener('resize', scalePreview);
    </script>
</body>
</html>
