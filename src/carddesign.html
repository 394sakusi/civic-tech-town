<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シビックテック・タウン カードデザイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Color+Emoji&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', 'Noto Color Emoji', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        
        /* 印刷用ページ設定 (A4) */
        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            body { background-color: white; padding: 0; }
            .no-print { display: none !important; }
            .page-break { 
                page-break-after: always; 
                width: 210mm;
                height: 297mm;
                padding: 16.5mm 10.5mm; 
                box-sizing: border-box;
                position: relative;
            }
            .print-grid { 
                display: grid; 
                grid-template-columns: repeat(3, 63mm); 
                grid-template-rows: repeat(3, 88mm);
                gap: 0; 
                width: 189mm;
                height: 264mm;
            }
        }
        
        @media screen {
            .page-break { margin: 20px auto; background: white; padding: 40px; max-width: 900px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
            .print-grid { display: grid; grid-template-columns: repeat(3, 63mm); grid-auto-rows: 88mm; gap: 10px; justify-content: center; }
        }

        .card-container {
            width: 63mm;
            height: 88mm;
            position: relative;
            box-sizing: border-box;
            border: 0.1mm dashed #cbd5e1; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        .card-wrapper {
            width: 280px;
            height: 400px;
            transform: scale(0.85); 
            transform-origin: center center;
            position: absolute;
            box-sizing: border-box;
            border-radius: 20px; 
            overflow: hidden;
            background-color: white;
            flex-shrink: 0;
        }

        .blank-line {
            border-bottom: 1.5px dashed #cbd5e1;
            height: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .pat-event { background-image: repeating-linear-gradient(45deg, rgba(220, 38, 38, 0.1) 0, rgba(220, 38, 38, 0.1) 10px, transparent 10px, transparent 20px); }
        .pat-hp { background: repeating-conic-gradient(from 0deg, rgba(251, 191, 36, 0.05) 0deg 15deg, transparent 15deg 30deg); }
        .grid-bg-back { background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1.2px, transparent 1.2px); background-size: 16px 16px; }
    </style>
</head>

                const backSvg = (cClass) => `
                    <div class="w-full h-full border-2 border-white rounded-[8px] flex flex-col items-center justify-center relative overflow-hidden bg-slate-800/10">
                        <div class="absolute inset-0 pat-hp opacity-50"></div>
                        <div class="absolute inset-0 flex items-center justify-center ${cClass} z-0">
                            <svg width="260" height="176" viewBox="0 0 260 176" fill="none">
                                <path d="M130 50 L160 70 V110 L130 130 L100 110 V70 Z" fill="white"/>
                                <path d="M130 100 C120 100 115 90 115 85 M145 85 C145 90 140 100 130 100" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="122" cy="80" r="2" fill="currentColor"/>
                                <circle cx="138" cy="80" r="2" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="absolute bottom-2 w-full text-center z-20">
                            <span class="text-white font-black tracking-[0.2em] text-[8px] opacity-90 drop-shadow-md">HAPPINESS POINTS</span>
                        </div>
                    </div>`;

                return wrap(`
                <div class="w-[280px] h-[400px] rounded-[20px] bg-yellow-400 flex flex-col box-border border-[6px] border-yellow-400 relative overflow-hidden">
                    <div class="absolute top-[188px] left-[-6px] right-[-6px] h-[12px] flex items-center justify-center z-30">
                        <span class="text-[8px] text-yellow-800/80 mr-1">✂</span>
                        <div class="w-full border-t border-dashed border-yellow-800/50"></div>
                        <span class="text-[8px] text-yellow-800/80 ml-1">✂</span>
                    </div>

                    <div class="absolute top-0 left-0 right-0 h-[188px] p-[4px]">
                        ${backSvg(card.card1.textClass || 'text-amber-600')}
                    </div>
                    
                    <div class="absolute bottom-0 left-0 right-0 h-[188px] p-[4px]">
                        ${backSvg(card.card2.textClass || 'text-amber-600')}
                    </div>
                </div>`);
            }

            // --- プロジェクト以外は幾何学模様のシンプル裏面 ---
            let bg = "bg-slate-800", border = "border-slate-700", innerBorder = "border-slate-600", text = "CIVIC TECH TOWN", svgContent = "", bgDeco = "", coloredLines = "", htmlContent = "";
            let colorClass = "text-white";
            
            if(card.type === 'reg' || card.type === 'blank_reg') {
                bg="bg-emerald-500"; border="border-emerald-500"; innerBorder="border-white"; text="REGION BASE";
                svgContent=`<path d="M140 200 L60 80 M140 200 L220 80 M140 200 L60 320 M140 200 L220 320" stroke="white" stroke-width="2" stroke-dasharray="6 6" opacity="0.4"/><path d="M140 155 L179 177.5 V222.5 L140 245 L101 222.5 V177.5 Z" fill="white"/><path d="M140 185 L150 195 H130 L140 185Z" fill="#10b981"/><rect x="133" y="195" width="14" height="12" fill="#10b981"/><circle cx="140" cy="218" r="4" fill="#10b981"/>`;
                bgDeco=`<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(rgba(255, 255, 255, 0.7) 1px, transparent 1px); background-size: 20px 20px;"></div>`;
            } 
            else if(card.type === 'res' || card.type === 'blank_res') {
                const sub = card.sub || 'data';
                if(sub === 'data') { innerBorder="border-sky-400"; text="RESOURCE / DATA"; svgContent=`<path d="M140 200 L240 100 M40 300 L140 200" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/><circle cx="240" cy="100" r="4" fill="#38bdf8" opacity="0.6"/><circle cx="40" cy="300" r="4" fill="#38bdf8" opacity="0.6"/><path d="M140 155 L180 177.5 V222.5 L140 245 L100 222.5 V177.5 Z" fill="#38bdf8"/><rect x="122" y="205" width="6" height="12" fill="white"/><rect x="132" y="195" width="6" height="22" fill="white"/><rect x="142" y="200" width="6" height="17" fill="white"/>`; }
                else if(sub === 'tech') { innerBorder="border-purple-400"; text="RESOURCE / TECH"; svgContent=`<path d="M40 100 L240 300" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/><circle cx="40" cy="100" r="4" fill="#a855f7" opacity="0.6"/><circle cx="240" cy="300" r="4" fill="#a855f7" opacity="0.6"/><path d="M140 155 L180 177.5 V200 L160 220 L140 245 L100 222.5 V177.5 Z" fill="#a855f7"/><rect x="128" y="188" width="24" height="24" rx="2" fill="white" transform="rotate(45 140 200)"/><circle cx="140" cy="200" r="5" fill="#a855f7"/>`; }
                else { innerBorder="border-emerald-400"; text="RESOURCE / DIALOGUE"; svgContent=`<circle cx="140" cy="200" r="70" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.3"/><path d="M140 155 L180 177.5 V210 L165 210 L140 245 L115 210 L100 210 V177.5 Z" fill="#10b981"/><circle cx="134" cy="190" r="8" fill="white"/><circle cx="146" cy="198" r="8" fill="white" opacity="0.8"/>`; }
                bgDeco=`<div class="absolute inset-0 grid-bg-back"></div>`;
                const lc = {data:'bg-sky-400', tech:'bg-purple-400', dial:'bg-emerald-400'};
                coloredLines=`<div class="absolute top-0 left-0 right-0 h-1 ${lc[sub]}"></div><div class="absolute bottom-0 left-0 right-0 h-1 ${lc[sub]}"></div>`;
            } 
            else if(card.type === 'evt' || card.type === 'blank_evt') {
                bg="bg-red-600"; border="border-red-600"; innerBorder="border-white"; text="EVENT / ALERT";
                svgContent=`<path d="M140 150 L185 175 V225 L140 250 L95 225 V175 Z" fill="white"/><rect x="136" y="185" width="8" height="20" rx="4" fill="#dc2626"/><circle cx="140" cy="215" r="4.5" fill="#dc2626"/>`;
                bgDeco=`<div class="absolute inset-0 pat-event opacity-10"></div>`;
            } 
            else if(card.type === 'sum') {
                bg="bg-slate-700"; border="border-slate-700"; innerBorder="border-slate-400"; text="TOWN / SUMMARY";
                svgContent=`<path d="M140 200 L40 100 M140 200 L240 100 M140 200 L40 300 M140 200 L240 300" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/><path d="M140 160 L174.6 180 V220 L140 240 L105.4 220 V180 Z" fill="white" stroke="#475569" stroke-width="3"/><path d="M120 220 V210 L128 202 L135 210 V220 H120Z M135 220 V200 L142 193 L150 200 V220 H135Z M150 220 V212 L155 207 L160 212 V220 H150Z" fill="#475569"/>`;
                bgDeco=`<div class="absolute inset-0 grid-bg-back opacity-20"></div>`;
            } 

            return `
            <div class="w-full h-full p-[10px] ${bg} flex flex-col box-border border-[6px] ${border} rounded-[20px]">
                <div class="w-full h-full border-2 ${innerBorder} rounded-[10px] flex flex-col items-center justify-center relative overflow-hidden bg-slate-800/10">
                    ${bgDeco}${coloredLines}
                    <div class="absolute inset-0 flex items-center justify-center ${colorClass} z-0">
                        <svg width="280" height="400" viewBox="0 0 280 400" fill="none">
                            ${svgContent}
                        </svg>
                    </div>
                    <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
                        ${htmlContent}
                    </div>
                    <div class="absolute bottom-6 w-full text-center z-20">
                        <span class="text-white font-black tracking-[0.3em] text-[10px] opacity-90 drop-shadow-md">${text}</span>
                    </div>
                </div>
            </div>`;
        }

        // ----------------------------------------------------
        // 4. ページ構築処理
        // ----------------------------------------------------
        const printArea = document.getElementById('print-area');
        
        for (let i = 0; i < deck.length; i += 9) {
            const chunk = deck.slice(i, i + 9);
            
            // 表面ページ
            let frontHtml = `<div class="page-break"><div class="print-grid">`;
            chunk.forEach(card => { 
                frontHtml += `<div class="card-container"><div class="card-wrapper">${renderFront(card)}</div></div>`; 
            });
            for (let j = chunk.length; j < 9; j++) frontHtml += `<div class="card-container"><div class="card-wrapper opacity-0"></div></div>`;
            frontHtml += `</div></div>`;
            printArea.insertAdjacentHTML('beforeend', frontHtml);

            // 裏面ページ (ミラーリング)
            let backHtml = `<div class="page-break"><div class="print-grid">`;
            for (let row = 0; row < 9; row += 3) {
                let rowCards = chunk.slice(row, row + 3);
                while (rowCards.length < 3 && row < chunk.length) rowCards.push({ type: 'empty' });
                rowCards.reverse().forEach(card => {
                    if (card.type === 'empty') {
                        backHtml += `<div class="card-container"><div class="card-wrapper opacity-0"></div></div>`;
                    } else {
                        backHtml += `<div class="card-container"><div class="card-wrapper">${renderBack(card)}</div></div>`;
                    }
                });
            }
            backHtml += `</div></div>`;
            printArea.insertAdjacentHTML('beforeend', backHtml);
        }
    </script>
</body>
</html>
